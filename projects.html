<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --bg2: #151517;
    --bg3: #1c1c1f;
    --border: #2a2a2e;
    --border2: #3a3a3f;
    --text: #e8e6e0;
    --text2: #9a9890;
    --text3: #5a5855;
    --accent: #c8b97a;
    --accent2: #8fa89e;
    --red: #c47a6a;
    --green: #7aab8a;
    --blue: #7a9abf;
    --purple: #a08abf;
    --orange: #c49060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TOPBAR ── */
  .topbar {
    display: flex;
    align-items: center;
    padding: 0 48px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 200;
  }
  .topbar-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 300;
    white-space: nowrap;
    color: var(--text);
  }
  .topbar-title span { color: var(--accent); font-style: italic; }
  .topbar-link {
    font-size: 10px;
    color: var(--text3);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 2px;
    transition: all 0.15s;
  }
  .topbar-link:hover { color: var(--accent); border-color: rgba(200,185,122,0.4); }

  /* ── HEADER ── */
  header {
    padding: 48px 48px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    position: sticky;
    top: 56px;
    background: var(--bg);
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-left h1 {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1;
  }

  .header-left h1 span { color: var(--accent); font-style: italic; }

  .header-meta {
    font-size: 11px;
    color: var(--text3);
    margin-top: 8px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 32px;
    align-items: flex-end;
  }

  .stat {
    text-align: right;
  }

  .stat-num {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  /* ── FILTERS ── */
  .filters {
    padding: 16px 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-right: 8px;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,185,122,0.06); }

  .new-proj-btn {
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 0.05em;
    transition: all 0.15s;
    margin-left: auto;
    white-space: nowrap;
  }
  .new-proj-btn:hover { background: rgba(200,185,122,0.08); }

  .search-input {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    border-radius: 2px;
    outline: none;
    width: 220px;
  }

  .search-input:focus { border-color: var(--border2); }
  .search-input::placeholder { color: var(--text3); }

  /* ── GRID ── */
  .grid {
    padding: 32px 48px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 2px;
  }

  /* ── CARD ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-accent, var(--border));
    transition: all 0.2s;
  }

  .card:hover {
    background: var(--bg3);
    border-color: var(--border2);
    transform: translateY(-1px);
  }

  .card:hover::before { opacity: 1; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .card-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .card-type {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text3);
    border: 1px solid var(--border);
    padding: 3px 7px;
    border-radius: 2px;
    white-space: nowrap;
    margin-left: 12px;
    margin-top: 3px;
  }

  .card-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .card-meta {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--text3);
  }

  .meta-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--card-accent, var(--text3));
    flex-shrink: 0;
  }

  /* progress bar */
  .progress-wrap {
    margin-bottom: 16px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--card-accent, var(--accent));
    border-radius: 1px;
    transition: width 0.6s ease;
  }

  /* next step */
  .next-step {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 10px 14px;
    border-radius: 2px;
    margin-bottom: 14px;
  }

  .next-step-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text3);
    margin-bottom: 4px;
  }

  .next-step-text {
    font-size: 11px;
    color: var(--text);
    line-height: 1.5;
  }

  /* directory */
  .dir-path {
    font-size: 10px;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 6px 10px;
    border-radius: 2px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .dir-path:hover { border-color: var(--border2); color: var(--text2); }

  .dir-path span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .copy-icon {
    opacity: 0.4;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }

  .dir-path:hover .copy-icon { opacity: 0.8; }

  /* status badge */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 2px;
    border: 1px solid;
  }

  .status-dot { width: 4px; height: 4px; border-radius: 50%; }

  .status-idea     { color: var(--text3);  border-color: var(--border);  }  
  .status-planning { color: var(--blue);   border-color: rgba(122,154,191,0.3); }
  .status-building { color: var(--orange); border-color: rgba(196,144,96,0.3); }
  .status-active   { color: var(--green);  border-color: rgba(122,171,138,0.3); }
  .status-paused   { color: var(--red);    border-color: rgba(196,122,106,0.3); }

  /* modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    width: 100%;
    max-width: 640px;
    max-height: 85vh;
    overflow-y: auto;
    border-radius: 4px;
    position: relative;
  }

  .modal-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg2);
  }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .modal-subtitle { font-size: 12px; color: var(--text2); }

  .modal-close {
    position: absolute;
    top: 24px; right: 24px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .modal-close:hover { border-color: var(--border2); color: var(--text); }

  .modal-body { padding: 24px 28px; }

  .modal-section { margin-bottom: 24px; }
  .modal-section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text3);
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .modal-desc { font-size: 13px; color: var(--text2); line-height: 1.7; }

  .step-list { display: flex; flex-direction: column; gap: 8px; }

  .step-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
  }

  .step-num {
    font-size: 10px;
    color: var(--text3);
    min-width: 18px;
    padding-top: 1px;
  }

  .step-text { font-size: 12px; color: var(--text); line-height: 1.5; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }

  .tag {
    font-size: 10px;
    padding: 3px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text2);
  }

  /* edit fields */
  .edit-field {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    width: 100%;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }

  .edit-field:focus { border-color: var(--accent); }

  .save-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    padding: 8px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 0.05em;
    transition: opacity 0.15s;
    text-transform: uppercase;
  }

  .save-btn:hover { opacity: 0.85; }

  /* empty state */
  .empty-state {
    text-align: center;
    padding: 80px 48px;
    color: var(--text3);
    font-size: 13px;
  }

  .empty-state span {
    font-family: 'Fraunces', serif;
    font-size: 48px;
    display: block;
    margin-bottom: 12px;
    opacity: 0.3;
  }

  /* notification */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 10px 16px;
    font-size: 11px;
    border-radius: 2px;
    z-index: 300;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  @media (max-width: 600px) {
    header { padding: 24px 20px 20px; flex-direction: column; align-items: flex-start; gap: 16px; }
    .filters { padding: 12px 20px; }
    .grid { padding: 20px; grid-template-columns: 1fr; }
    .search-input { margin-left: 0; width: 100%; }
  }
</style>
</head>

<div class="topbar">
  <div class="topbar-title">Project <span>OS</span></div>
  <a href="pm.html" class="topbar-link">PM</a>
  <a href="weekly.html" class="topbar-link">Weekly</a>
</div>

<header>

    <h1>Project <span>OS</span></h1>

  </div>
  <div class="header-stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Projects</div>

      <div class="stat-num" id="stat-active">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-building">0</div>
      <div class="stat-label">Building</div>

</header>

<div class="filters">
  <span class="filter-label">Filter</span>
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('consumer', this)">Consumer</button>
  <button class="filter-btn" onclick="setFilter('tool', this)">Personal Tool</button>
  <button class="filter-btn" onclick="setFilter('community', this)">Community</button>
  <button class="filter-btn" onclick="setFilter('infra', this)">Infra / R&D</button>
  <button class="filter-btn" onclick="setFilter('creative', this)">Creative</button>
  <button class="filter-btn status-building" style="margin-left:8px" onclick="setStatusFilter('building', this)">Building</button>
  <button class="filter-btn status-planning" onclick="setStatusFilter('planning', this)">Planning</button>
  <button class="filter-btn status-active" onclick="setStatusFilter('active', this)">Active</button>
  <button class="new-proj-btn" onclick="openNewProjectModal()">+ New Project</button>
  <input class="search-input" type="text" placeholder="search projects..." oninput="handleSearch(this.value)" />
</div>

<div class="grid" id="grid"></div>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-subtitle" id="modal-subtitle"></div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── PROJECT TYPE CONFIG ──
const TYPE_LABELS = { consumer:'Consumer App', tool:'Personal Tool', community:'Community', infra:'Infra / R&D', creative:'Creative Tool' };
const TYPE_ACCENTS = { consumer:'#7aab8a', tool:'#7a9abf', community:'#c8b97a', infra:'#a08abf', creative:'#c49060' };

// ── STATE ──
let activeFilter = 'all';
let activeStatusFilter = null;
let searchQuery = '';
let projects = PROJECTS.map(p => ({ ...p })); // mutable seed copy; Notion overwrites mutable fields

// ── API ──
async function api(method, url, body) {
  const res = await fetch(url, {
    method,
    headers: body ? { 'Content-Type': 'application/json' } : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

// ── RENDER ──
function getStatusClass(s) {
  return { idea: 'status-idea', planning: 'status-planning', building: 'status-building', active: 'status-active', paused: 'status-paused' }[s] || 'status-idea';
}

function getStatusLabel(s) {
  return { idea: 'Idea', planning: 'Planning', building: 'Building', active: 'Active', paused: 'Paused' }[s] || s;
}

function renderCard(p) {
  return `
    <div class="card" style="--card-accent: ${p.accentColor}" onclick="openModal(${p.id})">
      <div class="card-header">
        <div class="card-title">${p.name}</div>
        <div class="card-type">${p.typeLabel}</div>
      </div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-meta">
        <div class="meta-item">
          <div class="meta-dot"></div>
          <span class="status-badge ${getStatusClass(p.status)}">
            <span class="status-dot" style="background:currentColor"></span>
            ${getStatusLabel(p.status)}
          </span>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>Progress</span><span>${p.progress}%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${p.progress}%"></div></div>
      </div>
      <div class="next-step">
        <div class="next-step-label">Next Step</div>
        <div class="next-step-text">${p.nextStep}</div>
      </div>
      <div class="dir-path" onclick="copyPath(event, '${p.dir}')">
        <span>${p.dir}</span>
        <svg class="copy-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      </div>
    </div>`;
}

function renderGrid() {
  const filtered = projects.filter(p => {
    const matchType = activeFilter === 'all' || p.type === activeFilter;
    const matchStatus = !activeStatusFilter || p.status === activeStatusFilter;
    const matchSearch = !searchQuery || 
      p.name.toLowerCase().includes(searchQuery) || 
      p.desc.toLowerCase().includes(searchQuery) ||
      p.tags.some(t => t.toLowerCase().includes(searchQuery));
    return matchType && matchStatus && matchSearch;
  });

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span>◎</span>No projects match this filter.</div>`;
  } else {
    grid.innerHTML = filtered.map(renderCard).join('');
  }
  updateStats();
}

function updateStats() {
  document.getElementById('stat-total').textContent = projects.length;
  document.getElementById('stat-active').textContent = projects.filter(p => p.status === 'active').length;
  document.getElementById('stat-building').textContent = projects.filter(p => p.status === 'building').length;
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

// ── FILTERS ──
function setFilter(type, btn) {
  activeFilter = type;
  activeStatusFilter = null;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function setStatusFilter(status, btn) {
  if (activeStatusFilter === status) {
    activeStatusFilter = null;
    btn.classList.remove('active');
  } else {
    activeStatusFilter = status;
    document.querySelectorAll('.filter-btn').forEach(b => {
      if (b !== btn && ['building','planning','active','paused','idea'].some(s => b.onclick?.toString().includes(s))) {
        b.classList.remove('active');
      }
    });
    btn.classList.add('active');
  }
  renderGrid();
}

function handleSearch(val) {
  searchQuery = val.toLowerCase();
  renderGrid();
}

// ── MODAL ──
function openModal(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;

  document.getElementById('modal-title').textContent = p.name;
  document.getElementById('modal-subtitle').textContent = p.typeLabel + ' · ' + getStatusLabel(p.status);

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-section">
      <div class="modal-section-title">Description</div>
      <div class="modal-desc">${p.desc}</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Tags</div>
      <div class="tag-list">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Build Steps</div>
      <div class="step-list">${p.steps.map((s,i) => `
        <div class="step-item">
          <span class="step-num">${String(i+1).padStart(2,'0')}</span>
          <span class="step-text">${s}</span>
        </div>`).join('')}</div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Directory</div>
      <div class="dir-path" onclick="copyPath(event, '${p.dir}')">
        <span>${p.dir}</span>
        <svg class="copy-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2v1"/></svg>
      </div>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Edit — Next Step</div>
      <textarea class="edit-field" id="edit-next" rows="3">${p.nextStep}</textarea>
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Edit — Directory Path</div>
      <input class="edit-field" id="edit-dir" value="${p.dir}" />
    </div>

    <div class="modal-section">
      <div class="modal-section-title">Edit — Status & Progress</div>
      <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
        ${['idea','planning','building','active','paused'].map(s => `
          <button class="filter-btn ${p.status===s?'active':''}" 
            style="${p.status===s?'border-color:'+p.accentColor+';color:'+p.accentColor:''}"
            onclick="setCardStatus(${id},'${s}',this)">${getStatusLabel(s)}</button>
        `).join('')}
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <input type="range" id="edit-progress" min="0" max="100" value="${p.progress}" 
          style="flex:1;accent-color:${p.accentColor}" oninput="document.getElementById('prog-val').textContent=this.value+'%'">
        <span id="prog-val" style="color:var(--text2);font-size:12px;min-width:36px">${p.progress}%</span>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="save-btn" onclick="saveCard(${id})">Save Changes</button>
    </div>
  `;

  document.getElementById('modal').classList.add('open');
}

function setCardStatus(id, status, btn) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  p.status = status;
  btn.closest('.modal-section').querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active');
    b.style.borderColor = ''; b.style.color = '';
  });
  btn.classList.add('active');
  btn.style.borderColor = p.accentColor;
  btn.style.color = p.accentColor;
}

async function saveCard(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  p.nextStep = document.getElementById('edit-next').value;
  p.dir = document.getElementById('edit-dir').value;
  p.progress = parseInt(document.getElementById('edit-progress').value);
  renderGrid();
  showToast('Saving…');
  try {
    const data = await api('POST', '/api/notion?resource=projects', {
      name: p.name, status: p.status, progress: p.progress,
      nextStep: p.nextStep, dir: p.dir,
    });
    p.notionId = data.notionId;
    showToast('Saved ✓');
  } catch (e) {
    showToast('Save failed');
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal').classList.remove('open');
}

// ── UTILS ──
function copyPath(e, path) {
  e.stopPropagation();
  navigator.clipboard.writeText(path).then(() => showToast('Path copied'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

      </div>
      <input type="hidden" id="new-type" value="${types[0]}" />
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Status</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="new-status-group">
        ${statuses.map((s,i) => `
          <button class="filter-btn ${i===0?'active':''}"
            style="${i===0?'border-color:var(--text3);color:var(--text3)':''}"
            onclick="selectNewStatus('${s}',this)">${getStatusLabel(s)}</button>
        `).join('')}
      </div>
      <input type="hidden" id="new-status" value="${statuses[0]}" />
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Description</div>
      <textarea class="edit-field" id="new-desc" rows="3" placeholder="What is this project?"></textarea>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Next Step</div>
      <textarea class="edit-field" id="new-next" rows="2" placeholder="What's the immediate next action?"></textarea>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Directory</div>
      <input class="edit-field" id="new-dir" placeholder="~/Projects/..." />
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Progress</div>
      <div style="display:flex;align-items:center;gap:12px">
        <input type="range" id="new-progress" min="0" max="100" value="0"
          style="flex:1;accent-color:var(--accent)" oninput="document.getElementById('new-prog-val').textContent=this.value+'%'">
        <span id="new-prog-val" style="color:var(--text2);font-size:12px;min-width:36px">0%</span>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="save-btn" onclick="saveNewProject()">Create Project</button>
    </div>
  `;

  document.getElementById('modal').classList.add('open');
}

function selectNewType(type, btn) {
  document.getElementById('new-type').value = type;
  const accent = TYPE_ACCENTS[type] || 'var(--accent)';
  document.getElementById('new-type-group').querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active'); b.style.borderColor = ''; b.style.color = '';
  });
  btn.classList.add('active');
  btn.style.borderColor = accent; btn.style.color = accent;
}

function selectNewStatus(status, btn) {
  document.getElementById('new-status').value = status;
  document.getElementById('new-status-group').querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active'); b.style.borderColor = ''; b.style.color = '';
  });
  btn.classList.add('active');
}

async function saveNewProject() {
  const name = document.getElementById('new-name').value.trim();
  if (!name) { showToast('Name is required'); return; }

  const type = document.getElementById('new-type').value;
  const status = document.getElementById('new-status').value;
  const desc = document.getElementById('new-desc').value.trim();
  const nextStep = document.getElementById('new-next').value.trim();
  const dir = document.getElementById('new-dir').value.trim() || `~/Projects/${name.toLowerCase().replace(/\s+/g,'-')}`;
  const progress = parseInt(document.getElementById('new-progress').value);
  const newId = Date.now();

  const newProj = {
    id: newId, name, type, typeLabel: TYPE_LABELS[type] || 'Project',
    desc: desc || '—', status, progress,
    accentColor: TYPE_ACCENTS[type] || '#9a9890',
    dir, tags: [], nextStep, steps: [],
  };

  projects.push(newProj);
  renderGrid();
  closeModalDirect();
  showToast('Creating…');

  try {
    const data = await api('POST', '/api/notion?resource=projects', { name, status, progress, nextStep, dir });
    newProj.notionId = data.notionId;
    showToast('Project created ✓');
  } catch (e) {
    showToast('Saved locally; Notion sync failed');
  }
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

// ── INIT ──
async function initDashboard() {
  renderGrid(); // show seed data immediately
  try {
    const notionProjects = await api('GET', '/api/notion?resource=projects');
    let ephemeralId = Math.max(...projects.map(p => p.id), 0) + 1000;
    notionProjects.forEach(np => {
      const p = projects.find(x => x.name === np.name);
      if (p) {
        p.notionId = np.notionId;
        if (np.status) p.status = np.status;
        if (np.progress != null) p.progress = np.progress;
        if (np.nextStep) p.nextStep = np.nextStep;
        if (np.dir) p.dir = np.dir;
      } else {
        // project exists in Notion but not in local seed (added via UI or Notion directly)
        projects.push({
          id: ephemeralId++,
          name: np.name,
          type: 'tool',
          typeLabel: 'Project',
          desc: np.nextStep || '',
          status: np.status || 'idea',
          progress: np.progress || 0,
          accentColor: '#9a9890',
          dir: np.dir || '',
          tags: [], nextStep: np.nextStep || '', steps: [],
          notionId: np.notionId,
        });
      }
    });
    renderGrid();
  } catch (e) {
    console.warn('Notion unavailable, using seed data', e);
  }
}
initDashboard();
</script>
</body>
</html>
